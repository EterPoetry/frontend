<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#E9E4DA"/>
    </linearGradient>
    <linearGradient id="voice" x1="0" y1="0" x2="340" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B4A2E"/>
      <stop offset="1" stop-color="#B17A61"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#3D3028" flood-opacity="0.12"/>
    </filter>
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 0H8" stroke="#3D3028" stroke-opacity="0.028"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#grain)" opacity="0.62"/>

  <g filter="url(#softShadow)">
    <rect x="78" y="70" width="1044" height="490" rx="22" fill="#FFF8EC" stroke="#C2B6A5" stroke-width="2"/>
    <rect x="106" y="100" width="988" height="430" rx="12" fill="none" stroke="#D9CFBF"/>
  </g>

  <g transform="translate(132 145)">
    <text x="0" y="0" fill="#8B4A2E" font-family="Georgia, serif" font-size="34" font-weight="700">Українська аудіопоезія</text>
    <text x="0" y="96" fill="#2F2823" font-family="Georgia, serif" font-size="78" font-weight="700">Поезія, яку</text>
    <text x="0" y="178" fill="#2F2823" font-family="Georgia, serif" font-size="78" font-weight="700">чути</text>
    <text x="0" y="256" fill="#5E554D" font-family="Georgia, serif" font-size="31">Етер — місце, де вірші</text>
    <text x="0" y="296" fill="#5E554D" font-family="Georgia, serif" font-size="31">звучать голосом</text>
  </g>

  <g transform="translate(132 486)">
    <rect x="0" y="-24" width="34" height="34" rx="17" fill="#8B4A2E"/>
    <path d="M13 -2V-12l8-2v10" stroke="#FFF8EC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="-2" r="2" fill="#FFF8EC"/>
    <circle cx="20" cy="-4" r="2" fill="#FFF8EC"/>
    <text x="52" y="0" fill="#687386" font-family="Georgia, serif" font-size="24" letter-spacing="2">ГОЛОС · СЛОВА</text>
  </g>

  <g transform="translate(745 180)">
    <rect x="-36" y="-34" width="350" height="300" rx="18" fill="#F1E5CF" stroke="#D5C8B6"/>
    <rect x="0" y="142" width="30" height="86" rx="15" fill="url(#voice)"/>
    <rect x="52" y="90" width="30" height="138" rx="15" fill="url(#voice)" opacity="0.72"/>
    <rect x="104" y="122" width="30" height="106" rx="15" fill="url(#voice)"/>
    <rect x="156" y="54" width="30" height="174" rx="15" fill="url(#voice)" opacity="0.72"/>
    <rect x="208" y="112" width="30" height="116" rx="15" fill="url(#voice)"/>
    <rect x="260" y="78" width="30" height="150" rx="15" fill="url(#voice)" opacity="0.72"/>
  </g>
