name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate build secrets
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: |
          test -n "$VITE_API_URL" || (echo "VITE_API_URL secret is required" && exit 1)
          test -n "$VITE_SITE_URL" || (echo "VITE_SITE_URL secret is required" && exit 1)

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy directory on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Upload Docker Compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name }}:latest
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export APP_IMAGE="$APP_IMAGE"
            test -f .env || (echo ".env file is required in ${{ secrets.DEPLOY_PATH }}" && exit 1)
            grep -q '^PORT=' .env || (echo ".env must contain PORT" && exit 1)
            grep -q '^SITE_URL=' .env || (echo ".env must contain SITE_URL" && exit 1)
            grep -q '^META_API_BASE_URL=' .env || (echo ".env must contain META_API_BASE_URL" && exit 1)
            grep -q '^META_POST_PATH=' .env || (echo ".env must contain META_POST_PATH" && exit 1)
            grep -q '^META_PROFILE_PATH=' .env || (echo ".env must contain META_PROFILE_PATH" && exit 1)
            grep -q '^META_CACHE_TTL_MS=' .env || (echo ".env must contain META_CACHE_TTL_MS" && exit 1)
            grep -q '^META_API_TIMEOUT_MS=' .env || (echo ".env must contain META_API_TIMEOUT_MS" && exit 1)
            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            else
              echo "GHCR credentials are not set; trying anonymous pull."
            fi
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
